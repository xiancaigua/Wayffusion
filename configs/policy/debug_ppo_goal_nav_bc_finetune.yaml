name: debug_ppo_goal_nav_bc_finetune
algorithm: ppo
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 96
joint_hidden_dim: 256
decoder_hidden_dim: 128
use_spatial_attention: true
spatial_pool_size: 8
attention_heads: 4
num_envs: 4
rollout_steps: 256
total_updates: 300
target_episodes: 0
epochs: 4
minibatch_size: 256
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
target_kl: 0.03
ent_coef: 0.0001
vf_coef: 0.5
learning_rate: 0.00015
max_grad_norm: 0.5
log_std_init: -1.0
log_std_min: -2.2
log_std_max: -0.3
reward_norm: true
advantage_norm: true
lr_schedule: constant
eval_interval: 20
