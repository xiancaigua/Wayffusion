name: debug_ppo_coverage_spatialhead_ultra_stronger_repulsion
algorithm: ppo
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 96
joint_hidden_dim: 256
decoder_hidden_dim: 128
use_spatial_attention: true
use_spatial_action_head: true
spatial_pool_size: 8
attention_heads: 4
coordination_repulsion_strength: 0.4
spatial_action_strength: 0.55
num_envs: 4
rollout_steps: 256
total_updates: 120
target_episodes: 0
epochs: 1
minibatch_size: 256
gamma: 0.995
gae_lambda: 0.97
clip_coef: 0.03
target_kl: 0.003
ent_coef: 0.0
vf_coef: 0.5
learning_rate: 0.00002
max_grad_norm: 0.5
log_std_init: -1.6
log_std_min: -1.6
log_std_max: -1.6
reward_norm: true
advantage_norm: true
lr_schedule: constant
eval_interval: 20
