name: ppo_factorized_group
algorithm: ppo
policy_class: factorized_group
cnn_channels: [16, 32, 64]
agent_hidden_dim: 96
joint_hidden_dim: 256
decoder_hidden_dim: 128
use_spatial_attention: true
use_spatial_action_head: false
spatial_pool_size: 8
attention_heads: 4
num_groups: 4
group_hidden_dim: 128
group_assignment_temperature: 0.8
group_action_strength: 0.5
use_group_spatial_slots: true
coordination_repulsion_strength: 0.0
num_envs: 4
rollout_steps: 256
total_updates: 200
target_episodes: 0
epochs: 2
minibatch_size: 256
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.1
target_kl: 0.01
ent_coef: 0.01
vf_coef: 0.5
learning_rate: 0.0001
max_grad_norm: 0.5
log_std_init: -0.8
log_std_min: -1.6
log_std_max: 0.2
reward_norm: true
advantage_norm: true
lr_schedule: linear
eval_interval: 20
