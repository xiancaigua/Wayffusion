name: debug_ppo_risk_nav_factorized_group_dagger_safe
algorithm: ppo
policy_class: factorized_group
cnn_channels: [16, 32, 64]
agent_hidden_dim: 96
joint_hidden_dim: 256
decoder_hidden_dim: 128
use_spatial_attention: true
spatial_pool_size: 8
attention_heads: 4
num_groups: 4
group_hidden_dim: 128
group_assignment_temperature: 0.8
group_action_strength: 0.4
use_group_spatial_slots: true
coordination_repulsion_strength: 0.12
num_envs: 4
rollout_steps: 256
total_updates: 160
target_episodes: 0
epochs: 1
minibatch_size: 256
gamma: 0.995
gae_lambda: 0.97
clip_coef: 0.03
target_kl: 0.002
ent_coef: 0.0
vf_coef: 0.5
learning_rate: 0.00001
reference_policy_coef: 0.15
max_grad_norm: 0.5
log_std_init: -1.6
log_std_min: -1.8
log_std_max: -1.4
reward_norm: true
advantage_norm: true
lr_schedule: constant
eval_interval: 20
