name: bc_ppo_large_calibration
algorithm: ppo
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 64
joint_hidden_dim: 256
num_envs: 4
rollout_steps: 192
total_updates: 60
epochs: 4
minibatch_size: 64
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.005
vf_coef: 0.5
learning_rate: 0.0002
max_grad_norm: 0.5
reward_norm: true
advantage_norm: true
lr_schedule: linear
eval_interval: 10
