name: ppo_cnn_deepsets_spatial_reward_v2
algorithm: ppo
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 64
joint_hidden_dim: 256
decoder_hidden_dim: 128
use_spatial_attention: true
spatial_pool_size: 8
attention_heads: 4
num_envs: 4
rollout_steps: 128
total_updates: 1000
target_episodes: 0
epochs: 4
minibatch_size: 128
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.0005
vf_coef: 0.5
learning_rate: 0.0003
max_grad_norm: 0.5
log_std_init: -0.7
log_std_min: -1.8
log_std_max: 0.2
reward_norm: true
advantage_norm: true
lr_schedule: linear
eval_interval: 20
