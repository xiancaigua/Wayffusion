name: debug_ppo_coverage_utilityslot_ultra_strict
algorithm: ppo
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 96
joint_hidden_dim: 256
decoder_hidden_dim: 128
use_spatial_attention: true
use_spatial_action_head: true
spatial_pool_size: 8
attention_heads: 4
coordination_repulsion_strength: 0.20
spatial_action_strength: 0.25
use_angular_slot_embeddings: true
slot_embedding_strength: 1.0
use_coverage_utility_slot_head: true
coverage_utility_slot_strength: 0.25
coverage_utility_temperature: 8.0
coverage_utility_pool_size: 8
coverage_utility_sector_bias_strength: 0.8
coverage_utility_suppression_strength: 0.0
coverage_utility_suppression_sigma: 0.22
coverage_utility_target_weight: 0.6
coverage_utility_desired_weight: 1.8
coverage_utility_visited_weight: -0.5
coverage_utility_risk_weight: -0.25
coverage_utility_obstacle_weight: -1.0
coverage_utility_agent_density_weight: -0.35
actor_mean_residual_weight: 1.0
num_envs: 4
rollout_steps: 256
total_updates: 180
target_episodes: 0
epochs: 1
minibatch_size: 256
gamma: 0.995
gae_lambda: 0.97
clip_coef: 0.025
target_kl: 0.0025
ent_coef: 0.0
vf_coef: 0.5
learning_rate: 0.000015
max_grad_norm: 0.5
log_std_init: -1.6
log_std_min: -1.6
log_std_max: -1.6
reward_norm: true
advantage_norm: true
lr_schedule: constant
eval_interval: 20
