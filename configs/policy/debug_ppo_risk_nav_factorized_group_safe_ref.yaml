gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.02
target_kl: 0.0015
ent_coef: 0.0
vf_coef: 0.5
learning_rate: 0.000005
reference_policy_coef: 0.35
max_grad_norm: 0.5
log_std_init: -1.6
log_std_min: -1.6
