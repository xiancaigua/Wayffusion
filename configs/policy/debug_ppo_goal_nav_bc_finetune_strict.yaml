name: debug_ppo_goal_nav_bc_finetune_strict
algorithm: ppo
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 96
joint_hidden_dim: 256
decoder_hidden_dim: 128
use_spatial_attention: true
spatial_pool_size: 8
attention_heads: 4
num_envs: 4
rollout_steps: 256
total_updates: 400
target_episodes: 0
epochs: 2
minibatch_size: 256
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.1
target_kl: 0.01
ent_coef: 0.0
vf_coef: 0.5
learning_rate: 0.00005
max_grad_norm: 0.5
log_std_init: -1.4
log_std_min: -1.4
log_std_max: -1.4
reward_norm: true
advantage_norm: true
lr_schedule: constant
eval_interval: 20
