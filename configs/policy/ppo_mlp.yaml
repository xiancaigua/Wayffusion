name: ppo_mlp
algorithm: ppo
policy_class: mlp
hidden_dims: [256, 256]
num_envs: 4
rollout_steps: 128
total_updates: 20
epochs: 4
minibatch_size: 64
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.01
vf_coef: 0.5
learning_rate: 0.0003
max_grad_norm: 0.5
reward_norm: true
advantage_norm: true
lr_schedule: linear
eval_interval: 5
