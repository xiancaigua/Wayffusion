name: ppo_cnn_deepsets_multitask_20k
algorithm: ppo
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 64
joint_hidden_dim: 256
num_envs: 8
rollout_steps: 256
total_updates: 2000
target_episodes: 20000
epochs: 4
minibatch_size: 256
gamma: 0.99
gae_lambda: 0.95
clip_coef: 0.2
ent_coef: 0.01
vf_coef: 0.5
learning_rate: 0.0003
max_grad_norm: 0.5
reward_norm: true
advantage_norm: true
lr_schedule: linear
eval_interval: 25
