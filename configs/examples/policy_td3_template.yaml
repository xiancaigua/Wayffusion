# TD3 模范配置
name: td3_cnn_deepsets_template
algorithm: td3
policy_class: cnn_deepsets
cnn_channels: [16, 32, 64]
agent_hidden_dim: 64
joint_hidden_dim: 256
batch_size: 128
num_envs: 2
replay_size: 50000
warmup_steps: 500
total_steps: 3000
eval_interval_steps: 1000
gamma: 0.99
tau: 0.005
learning_rate: 0.0003
policy_delay: 2
policy_noise: 0.2
noise_clip: 0.5
