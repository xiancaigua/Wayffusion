# Wayffusion 环境模范配置
seed: 7
task_name: null
task_names:
  - goal_nav
  - coverage
task_sampling_probs:
  goal_nav: 0.5
  coverage: 0.5
map_size: 1.0
reference_num_agents: 4
grid_size: 64
num_agents: 4
scaling_mode: fixed_map
scale_max_steps_with_map: true
max_steps: 80
dt: 0.1
kp: 3.0
max_speed: 0.06
max_waypoint_step: 0.18
collision_radius: 0.045
goal_radius: 0.06
coverage_radius: 0.08
formation_radius: 0.18
formation_tolerance: 0.06
obstacle_density: 0.08
obstacle_size_range: [0.06, 0.18]
risk_blob_count: 3
risk_blob_sigma: 0.1
no_fly_threshold: 0.72
target_motion: static
communication_decay: 5.0
single_channel_weights: [1.0, 1.2, 1.1, 1.0, 1.0, 0.8, 0.7, 0.5, 0.8]
observation_mode: multi_channel
include_task_id: true
include_agent_density: true
drop_channels: []
render_dpi: 120
field_channels:
  - obstacle
  - goal_reward
  - target_probability
  - desired_occupancy
  - risk
  - visited
  - agent_density
  - communication_quality
  - formation_template
goal_nav:
  num_goals_range: [3, 5]
  density_goal_scale_exponent: 0.8
coverage:
  multi_peak_probability: false
  success_ratio: 0.82
  density_peak_scale_exponent: 0.8
formation:
  train_templates: [circle, line, diamond]
  eval_templates: [arc]
  angular_tolerance: 0.26
risk_nav:
  num_goals_range: [3, 4]
  risk_weight_scale: 1.4
  density_goal_scale_exponent: 0.8
task_sets:
  single_goal_nav: [goal_nav]
  single_coverage: [coverage]
  single_formation: [formation]
  single_risk_nav: [risk_nav]
  two_goal_cov: [goal_nav, coverage]
  two_goal_form: [goal_nav, formation]
  two_cov_risk: [coverage, risk_nav]
  three_goal_cov_form: [goal_nav, coverage, formation]
  four_task: [goal_nav, coverage, formation, risk_nav]
reward_weights:
  common:
    collision: -0.12
    obstacle_collision: -0.18
    path_length: -0.01
    time: -0.005
    safety_violation: -0.2
    risk: -0.05
  goal_nav:
    progress: 0.8
    goal_reached: 4.0
    coverage: 0.08
    distance: -0.05
    repeated_goal: -0.05
    success_bonus: 8.0
  coverage:
    new_coverage: 8.0
    high_probability: 4.0
    coverage_level: 0.25
    repeated_coverage: -0.08
    success_bonus: 10.0
  formation:
    error_reduction: 0.8
    error_penalty: 0.1
    angular_coverage: 0.08
    radius_error_penalty: 0.08
    stability: 0.0
    slot_proximity: 0.12
    success_bonus: 8.0
  risk_nav:
    progress: 1.0
    goal_reached: 5.0
    coverage: 0.08
    distance: -0.05
    repeated_goal: -0.05
    risk_exposure: -0.12
    success_bonus: 8.0
