tasks: [goal_nav, coverage]
agent_counts: [4, 8, 10]
observation_modes:
  - {observation_mode: no_spatial_field, include_task_id: true}
  - {observation_mode: single_channel_field, include_task_id: true}
  - {observation_mode: multi_channel_field, include_task_id: false}
  - {observation_mode: multi_channel_field, include_task_id: true}
  - {observation_mode: multi_channel_field, include_task_id: true, include_agent_density: true}
  - {observation_mode: multi_channel_field, include_task_id: true, drop_channels: [risk]}
  - {observation_mode: multi_channel_field, include_task_id: true, drop_channels: [desired_occupancy]}
episodes: 10
output_path: outputs/eval/observation_ablation.csv
